name: Publish Docker Image

on:
  pull_request:
    paths:
      - ".github/workflows/docker-publish.yml"
      - "Dockerfile"
      - ".dockerignore"
      - "VERSION"
      - "api/**"
      - "services/**"
      - "utils/**"
      - "scripts/**"
      - "web/**"
      - "main.py"
      - "pyproject.toml"
      - "uv.lock"
      - "config.json"
  push:
    branches:
      - "th/**"
    tags:
      - "v*"
  workflow_dispatch:

env:
  IMAGE_NAME: chatgpt2api

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=ref,event=tag
            type=sha
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build image artifact
        if: github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: app
          platforms: linux/amd64
          outputs: type=docker,dest=/tmp/chatgpt2api.tar
          tags: ghcr.io/${{ toLower(github.repository_owner) }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload image artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: chatgpt2api-${{ github.sha }}-linux-amd64
          path: /tmp/chatgpt2api.tar
          if-no-files-found: error
          retention-days: 1

      - name: Build and push image
        if: github.event_name != 'workflow_dispatch'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: app
          platforms: linux/amd64,linux/arm64
          push: ${{ startsWith(github.ref, 'refs/tags/v') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
